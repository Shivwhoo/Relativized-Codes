<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relativized Codes Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="logic.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Relativized Codes Simulator</h1>
        <p class="subtitle">Interactive analyzer for relativized code properties</p>
    </header>

    <main>
        <!-- Left Panel: Input -->
        <div class="card">
            <h2>⚙️ Configuration</h2>
            
            <div class="input-group">
                <label for="codewords-input">Code C (comma-separated words)</label>
                <div class="input-wrapper">
                    <input type="text" id="codewords-input" placeholder="e.g. ab, ba, c" value="ab, ba, c">
                </div>
                <small style="color: var(--text-secondary); margin-top: 5px; display: block;">Enter the words that form your code C.</small>
            </div>
            
            <button id="analyze-btn">Analyze Properties</button>
            
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">
            
            <h2>🔍 Test P-Admissibility</h2>
            <div class="input-group">
                <label for="test-word-input">Word q to test</label>
                <input type="text" id="test-word-input" placeholder="e.g. abccba">
            </div>
            
            <div class="input-group">
                <label for="predicate-select">Test Predicate</label>
                <select id="predicate-select" style="width: 100%; background: rgba(13, 17, 23, 0.8); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px 16px; border-radius: 8px; font-size: 1rem; outline: none;">
                    <option value="Prefix-free">Prefix-free</option>
                    <option value="Suffix-free">Suffix-free</option>
                    <option value="Bifix-free">Bifix-free</option>
                    <option value="Infix-free">Infix-free</option>
                    <option value="Outfix-free">Outfix-free</option>
                    <option value="Overlap-free">Overlap-free</option>
                    <option value="Solid">Solid</option>
                    <option value="Comma-free">Comma-free</option>
                    <option value="Hypercode">Hypercode</option>
                </select>
            </div>
            
            <button id="test-word-btn">Test Word</button>
        </div>

        <!-- Right Panel: Results -->
        <div class="card">
            <h2>📊 Code Properties</h2>
            <div id="code-display" class="code-display">C = { }</div>
            
            <div id="properties-results" class="results-grid">
                <!-- Badges will be generated here by JS -->
                <p style="color: var(--text-secondary);">Click "Analyze Properties" to evaluate.</p>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">
            
            <h2>📝 Decodings & Admissibility</h2>
            <div id="word-test-output" class="output-box">No word tested yet.</div>
        </div>
    </main>
</body>
</html>
